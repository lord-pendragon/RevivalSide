app = "downloadside"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8787"
  SERVICE_NAME = "DownloadSide"
  DOWNLOAD_PUBLIC_BASE_URL = "https://downloadside.fly.dev"
  DISCORD_REDIRECT_URI = "https://downloadside.fly.dev/auth/discord/callback"
  GITHUB_OWNER = "MadlyMoe"
  GITHUB_REPO = "RevivalSide"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 50

  [http_service.http_options]
    idle_timeout = 600

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
